<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- SEO Meta Tags -->
    <title>Flowly — Plan. Act. Achieve. | Smart Life Management</title>
    <meta name="description" content="Flowly — shaxsiy hayotni boshqarish platformasi. Kunlik, haftalik, oylik va yillik rejalar. Odatlar, maqsadlar, statistika va AI tavsiyalar." />
    <meta name="keywords" content="flowly, planner, life management, productivity, habits, goals, daily planner, weekly planner, task manager, uzbekistan" />
    <meta name="author" content="Yaxyobek Nematillaev" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph (Facebook, Telegram, etc.) -->
    <meta property="og:title" content="Flowly — Plan. Act. Achieve." />
    <meta property="og:description" content="Smart Life Management Platform — kunlik rejalar, odatlar, maqsadlar va AI tavsiyalar" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://flowly-app.vercel.app" />
    <meta property="og:image" content="https://flowly-app.vercel.app/favicon.svg" />
    <meta property="og:locale" content="uz_UZ" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Flowly — Plan. Act. Achieve." />
    <meta name="twitter:description" content="Smart Life Management Platform" />
    
    <!-- PWA / Mobile -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flowly" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- Fonts (preload for speed) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
  </head>
  <body>
    <script>
      // Prevent dark mode flicker (FOUC) — apply theme before React loads
      try { if (JSON.parse(localStorage.getItem('flowly-dark-mode'))) document.documentElement.classList.add('dark'); } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register Service Worker for PWA + offline support + speed
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
